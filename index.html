<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超黄体系 · 每日复盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans SC', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        bg: '#0a0e1a',
                        card: '#111827',
                        cardHover: '#1a2235',
                        border: '#1f2937',
                        gold: '#fbbf24',
                        red: '#ef4444',
                        green: '#22c55e',
                        amber: '#f59e0b',
                        rose: '#fb7185',
                        cyan: '#06b6d4',
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0a0e1a; color: #e2e8f0; font-family: 'Noto Sans SC', sans-serif; }
        .glass { background: rgba(17,24,39,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .card-glow { box-shadow: 0 0 20px rgba(251,191,36,0.05); }
        .pulse-gold { animation: pulseGold 2s infinite; }
        @keyframes pulseGold { 0%,100% { box-shadow: 0 0 5px rgba(251,191,36,0.3); } 50% { box-shadow: 0 0 20px rgba(251,191,36,0.6); } }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .tab-active { border-bottom: 2px solid #fbbf24; color: #fbbf24; }
        .limit-up { color: #ef4444; }
        .limit-down { color: #22c55e; }
        .card-shadow { box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 2px rgba(255,255,255,0.02); transition: all 0.2s ease; }
        .card-shadow:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 4px rgba(251,191,36,0.1); transform: translateY(-1px); }
        .section-card { border-left: 4px solid transparent; }
        .section-card.mode-a { border-left-color: #fbbf24; }
        .section-card.mode-b { border-left-color: #06b6d4; }
        .section-card.mode-c { border-left-color: #ef4444; }
        .data-highlight { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; }
        .table-row-alt:nth-child(even) { background: rgba(255,255,255,0.02); }
        .table-row-alt:hover { background: rgba(255,255,255,0.04); }
        .copy-code { cursor: pointer; position: relative; }
        .copy-code::after { content: '📋'; position: absolute; right: -20px; top: 0; opacity: 0; transition: opacity 0.2s; font-size: 10px; }
        .copy-code:hover::after { opacity: 0.6; }
        .copy-code:active::after { opacity: 1; }
        .loading { opacity: 0.5; pointer-events: none; }
        .error-banner { background: #ef444420; border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 8px; margin: 10px 0; text-align: center; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0e1a; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Error Banner -->
    <div id="error-banner" class="error-banner hidden max-w-7xl mx-auto mt-2"></div>

    <!-- 顶部导航 -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-gold to-amber rounded flex items-center justify-center">
                    <i class="fas fa-chart-line text-black text-sm"></i>
                </div>
                <h1 class="font-bold text-lg tracking-wide">超黄体系 <span class="text-gold">·</span> 每日复盘</h1>
            </div>
            <div class="flex items-center gap-4">
                <select id="dateSelector" onchange="loadData()" class="bg-card border border-border rounded px-3 py-1.5 text-sm focus:outline-none focus:border-gold">
                    <option value="2026-05-15">2026-05-15 周五</option>
                </select>
                <div id="marketTemp" class="px-3 py-1 rounded text-xs font-medium bg-amber-500/20 text-amber-400 border border-amber-500/30">
                    ⚠️ 分歧
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="pt-16 pb-8 px-4 max-w-7xl mx-auto" id="main-content">
        <!-- 核心数据卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="stat-cards">
            <div class="glass rounded-lg p-4 card-glow card-shadow">
                <div class="text-xs text-gray-400 mb-1 tracking-wide">涨停数</div>
                <div class="data-highlight limit-up" id="stat-limitup">--<span class="text-xs text-gray-500 ml-1 font-sans font-normal">只</span></div>
                <div class="text-xs text-gray-500 mt-1" id="stat-limitup-note">非ST: --</div>
            </div>
            <div class="glass rounded-lg p-4 card-glow card-shadow">
                <div class="text-xs text-gray-400 mb-1 tracking-wide">跌停数</div>
                <div class="data-highlight limit-down" id="stat-limitdown">--<span class="text-xs text-gray-500 ml-1 font-sans font-normal">只</span></div>
            </div>
            <div class="glass rounded-lg p-4 card-glow card-shadow">
                <div class="text-xs text-gray-400 mb-1 tracking-wide">最高连板</div>
                <div class="data-highlight text-gold" id="stat-maxboard">--<span class="text-xs text-gray-500 ml-1 font-sans font-normal">板</span></div>
                <div class="text-xs text-gray-500 mt-1" id="stat-maxboard-stock">--</div>
            </div>
            <div class="glass rounded-lg p-4 card-glow card-shadow">
                <div class="text-xs text-gray-400 mb-1 tracking-wide">上证涨跌</div>
                <div class="data-highlight limit-down" id="stat-shchange">--<span class="text-xs text-gray-500 ml-1 font-sans font-normal">%</span></div>
                <div class="text-xs text-gray-500 mt-1" id="stat-shindex">--</div>
            </div>
        </div>

        <!-- Tab 导航 -->
        <div class="flex gap-6 border-b border-border mb-6 overflow-x-auto" id="tab-nav">
            <button onclick="switchTab('wind')" id="tab-wind" class="tab-btn pb-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 whitespace-nowrap">
                <i class="fas fa-wind mr-1.5"></i>风向早报
            </button>
            <button onclick="switchTab('morning')" id="tab-morning" class="tab-btn pb-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 whitespace-nowrap">
                <i class="fas fa-sun mr-1.5"></i>早盘策略
            </button>
            <button onclick="switchTab('firstboard')" id="tab-firstboard" class="tab-btn pb-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 whitespace-nowrap">
                <i class="fas fa-star mr-1.5"></i>首板策略
            </button>
            <button onclick="switchTab('noon')" id="tab-noon" class="tab-btn pb-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 whitespace-nowrap">
                <i class="fas fa-cloud-sun mr-1.5"></i>午间小结
            </button>
            <button onclick="switchTab('review')" id="tab-review" class="tab-btn pb-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 whitespace-nowrap">
                <i class="fas fa-moon mr-1.5"></i>深度复盘
            </button>
            <button onclick="switchTab('youthu')" id="tab-youthu" class="tab-btn pb-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 whitespace-nowrap">
                <i class="fas fa-dragon mr-1.5"></i>游资复盘
            </button>
            <button onclick="switchTab('history')" id="tab-history" class="tab-btn pb-3 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-200 whitespace-nowrap">
                <i class="fas fa-archive mr-1.5"></i>历史归档
            </button>
        </div>

        <!-- Tab Content Container -->
        <div id="tab-content-container"></div>
    </main>

    <!-- 底部 -->
    <footer class="border-t border-border mt-8 py-6 text-center">
        <div class="text-xs text-gray-500">
            <p>超黄体系 · 每日复盘网站</p>
            <p class="mt-1">数据来源: 问财CLI + 脚本A V10.2 + 新浪财经 | Generated by Kimi Claw</p>
            <p class="mt-1 text-gray-600">⚠️ 数据为第三方估算，仅供学习交流，不构成投资建议</p>
        </div>
    </footer>

    <script>
        // ====== DYNAMIC DATA LOADING ======
        let currentData = null;
        
        async function loadData() {
            const dateSelector = document.getElementById('dateSelector');
            const date = dateSelector ? dateSelector.value : '2026-05-15';
            const url = `data/${date}.json`;
            
            document.body.classList.add('loading');
            const errorBanner = document.getElementById('error-banner');
            errorBanner.style.display = 'none';
            
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    // Fallback: try the static HTML content if JSON not found
                    throw new Error(`数据文件未找到 (${response.status})`);
                }
                currentData = await response.json();
                renderAll(currentData);
            } catch (err) {
                console.error('Failed to load data:', err);
                errorBanner.textContent = '⚠️ ' + err.message;
                errorBanner.style.display = 'block';
            } finally {
                document.body.classList.remove('loading');
            }
        }
        
        function renderAll(data) {
            if (!data) return;
            renderHeader(data);
            renderTabs(data);
        }
        
        function renderHeader(data) {
            // Update market temp badge
            const badge = document.getElementById('marketTemp');
            if (badge && data.marketTemp) {
                badge.textContent = data.marketTemp;
                const color = data.marketTempColor || 'amber';
                badge.className = `px-3 py-1 rounded text-xs font-medium bg-${color}-500/20 text-${color}-400 border border-${color}-500/30`;
            }
            
            // Update stat cards
            const stats = data.stats || {};
            document.getElementById('stat-limitup').innerHTML = `${stats.limitUp || '--'}<span class="text-xs text-gray-500 ml-1 font-sans font-normal">只</span>`;
            document.getElementById('stat-limitup-note').textContent = stats.limitUp ? `非ST: ${stats.limitUp}` : '非ST: --';
            document.getElementById('stat-limitdown').innerHTML = `${stats.limitDown || '--'}<span class="text-xs text-gray-500 ml-1 font-sans font-normal">只</span>`;
            document.getElementById('stat-maxboard').innerHTML = `${stats.maxBoard || '--'}<span class="text-xs text-gray-500 ml-1 font-sans font-normal">板</span>`;
            document.getElementById('stat-maxboard-stock').textContent = stats.maxBoardStock || '--';
            
            const shChange = stats.shChange || 0;
            const shChangeClass = shChange >= 0 ? 'limit-up' : 'limit-down';
            const shSign = shChange >= 0 ? '+' : '';
            document.getElementById('stat-shchange').innerHTML = `${shSign}${shChange}<span class="text-xs text-gray-500 ml-1 font-sans font-normal">%</span>`;
            document.getElementById('stat-shchange').className = `data-highlight ${shChangeClass}`;
            document.getElementById('stat-shindex').textContent = stats.shIndex || '--';
        }
        
        function renderTabs(data) {
            const container = document.getElementById('tab-content-container');
            if (!container) return;
            
            container.innerHTML = '';
            
            // Render each tab
            container.innerHTML += renderWindTab(data.wind || {});
            container.innerHTML += renderMorningTab(data.morning || {});
            container.innerHTML += renderFirstboardTab(data.firstboard || {});
            container.innerHTML += renderNoonTab(data.noon || {});
            container.innerHTML += renderReviewTab(data.review || {});
            container.innerHTML += renderYouthuTab(data.youthu || {});
            container.innerHTML += renderHistoryTab();
            
            // Activate first tab
            switchTab('wind');
        }

        // ====== TAB RENDERING FUNCTIONS ======
        
        function renderWindTab(wind) {
            if (!wind.usMarkets) return '<div id="content-wind" class="tab-content hidden"></div>';
            
            const usMarkets = wind.usMarkets.map(m => `
                <div class="bg-card rounded p-3 ${m.change >= 0 ? 'border border-gold/20' : ''}">
                    <div class="text-xs text-gray-400 mb-1">${m.name} ${m.note || ''}</div>
                    <div class="text-xl font-bold font-mono ${m.change >= 0 ? 'limit-up' : 'limit-down'}">${m.change >= 0 ? '+' : ''}${m.change}%</div>
                </div>
            `).join('');
            
            const techStocks = wind.techStocks.map(s => `
                <div class="flex justify-between"><span>${s.name}</span><span class="limit-up font-mono">+${s.change}%</span></div>
            `).join('');
            
            const policies = wind.policies.map(p => `
                <tr class="border-b border-border/50">
                    <td class="py-2 text-gray-400">${p.date}</td>
                    <td class="py-2">${p.event}</td>
                    <td class="py-2 text-gray-400">${p.source}</td>
                    <td class="py-2">${p.sector}</td>
                    <td class="py-2 text-center">${p.timing}</td>
                </tr>
            `).join('');
            
            return `
            <div id="content-wind" class="tab-content hidden">
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-cyan-400">
                        <i class="fas fa-globe-americas"></i>外围映射
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">${usMarkets}</div>
                    <div class="bg-card rounded p-3 mb-3">
                        <div class="text-xs text-gray-400 mb-2">热门科技股</div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-sm">${techStocks}</div>
                    </div>
                </div>
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-cyan-400">
                        <i class="fas fa-newspaper"></i>政策风向
                    </h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-xs">
                            <thead><tr class="text-gray-400 border-b border-border">
                                <th class="pb-2 text-left">日期</th>
                                <th class="pb-2 text-left">政策/事件</th>
                                <th class="pb-2 text-left">来源</th>
                                <th class="pb-2 text-left">影响板块</th>
                                <th class="pb-2 text-center">时效</th>
                            </tr></thead>
                            <tbody class="text-gray-300">${policies}</tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }
        
        function renderMorningTab(morning) {
            if (!morning.emotion) return '<div id="content-morning" class="tab-content hidden"></div>';
            
            const sectors = (morning.sectors || []).map(s => `
                <tr class="border-b border-border/50">
                    <td class="py-3 font-bold text-gold">${s.rank || ''}</td>
                    <td class="py-3 font-medium">${s.name}</td>
                    <td class="py-3 text-center font-mono">${s.limitUpCount}只</td>
                    <td class="py-3">${s.leader || '--'}</td>
                    <td class="py-3"><span class="text-amber-400">${s.status}</span></td>
                </tr>
            `).join('');
            
            const modeA = (morning.modeA || []).map(s => `
                <div class="bg-card rounded-lg p-4 border border-gold/20 ${s.risk ? 'pulse-gold' : ''}">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <span class="text-gold font-bold text-lg">${s.name}</span>
                            <span class="text-gray-400 text-sm ml-2">${s.code}</span>
                            <span class="text-xs bg-gold/20 text-gold px-2 py-0.5 rounded ml-2">${s.boards}天${s.boards}板</span>
                        </div>
                        <span class="text-xs bg-gold/20 text-gold px-2 py-1 rounded">✅ 超预期</span>
                    </div>
                    <div class="text-sm text-gray-300 mb-2">${s.sector}</div>
                    <div class="text-xs text-gray-400">${s.match}</div>
                    ${s.risk ? `<div class="text-xs text-amber-400 mt-1">${s.risk}</div>` : ''}
                    <div class="text-amber-400 text-xs mt-2">▸ 建议买点：分歧转一致上板</div>
                </div>
            `).join('');
            
            return `
            <div id="content-morning" class="tab-content hidden">
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-amber-400">
                        <i class="fas fa-thermometer-half"></i>情绪定位
                    </h2>
                    <div class="bg-red-500/10 border border-red-500/20 rounded p-3 text-center">
                        <span class="text-red-400 font-bold">🌡️ 情绪定位：${morning.emotion}</span>
                        <span class="text-gray-400 mx-2">|</span>
                        <span class="text-amber-400 font-bold">建议仓位：${morning.position || '总仓≤3成'}</span>
                    </div>
                </div>
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-red-400">
                        <i class="fas fa-fire"></i>板块强度实况
                    </h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead><tr class="text-gray-400 text-xs border-b border-border">
                                <th class="pb-2 text-left">排名</th>
                                <th class="pb-2 text-left">板块名称</th>
                                <th class="pb-2 text-center">涨停数</th>
                                <th class="pb-2 text-left">最高标</th>
                                <th class="pb-2 text-left">板块判定</th>
                            </tr></thead>
                            <tbody class="text-xs">${sectors}</tbody>
                        </table>
                    </div>
                </div>
                <div class="glass rounded-lg p-5 mb-5 card-shadow section-card mode-a">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gold">
                        <i class="fas fa-star"></i>Mode A：核心买点
                    </h2>
                    <div class="space-y-3">${modeA}</div>
                </div>
            </div>`;
        }
        
        function renderFirstboardTab(firstboard) {
            if (!firstboard.top5) return '<div id="content-firstboard" class="tab-content hidden"></div>';
            
            const top5 = (firstboard.top5 || []).map((s, i) => {
                const emoji = ['🥇','🥈','🥉','🏅','🏅'][i] || '🏅';
                return `
                <div class="bg-card rounded-lg p-4 border ${i === 0 ? 'border-gold/30 pulse-gold' : 'border-gray-500/20'}">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl font-bold ${i === 0 ? 'text-gold' : 'text-gray-300'}">${emoji} Top ${i+1}</span>
                            <span class="font-bold text-lg">${s.name}</span>
                            <span class="text-gray-400 font-mono">${s.code}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold font-mono ${s.score >= 80 ? 'text-gold' : s.score >= 70 ? 'text-cyan-400' : 'text-gray-400'}">${s.score}分</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-5 gap-2 text-xs mb-3">
                        <div class="bg-card rounded p-2 text-center"><div class="text-gray-400">大盘节点</div><div class="text-gold font-bold">${s.marketScore}/20</div></div>
                        <div class="bg-card rounded p-2 text-center"><div class="text-gray-400">板块强度</div><div class="text-gold font-bold">${s.sectorScore}/40</div></div>
                        <div class="bg-card rounded p-2 text-center"><div class="text-gray-400">人气</div><div class="text-gold font-bold">${s.popularityScore}/20</div></div>
                        <div class="bg-card rounded p-2 text-center"><div class="text-gray-400">分时</div><div class="text-gold font-bold">${s.timingScore}/20</div></div>
                        <div class="bg-card rounded p-2 text-center"><div class="text-gray-400">价格结构</div><div class="text-gold font-bold">${s.priceScore}/40</div></div>
                    </div>
                    <div class="bg-gold/10 border border-gold/20 rounded p-2 text-xs text-gold">
                        ▸ 策略：${s.strategy || '等开板回封，不打半路'}
                    </div>
                </div>`;
            }).join('');
            
            return `
            <div id="content-firstboard" class="tab-content hidden">
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gold">
                        <i class="fas fa-star"></i>首板策略 V4.0 · 五维评分精算
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                        <div class="bg-card rounded p-3 text-center">
                            <div class="text-xs text-gray-400">候选池</div>
                            <div class="text-xl font-bold font-mono text-gold">Top5</div>
                        </div>
                        <div class="bg-card rounded p-3 text-center">
                            <div class="text-xs text-gray-400">满分</div>
                            <div class="text-xl font-bold font-mono text-gold">140分</div>
                        </div>
                    </div>
                </div>
                <div class="space-y-4">${top5}</div>
            </div>`;
        }
        
        function renderNoonTab(noon) {
            if (!noon.overview) return '<div id="content-noon" class="tab-content hidden"></div>';
            
            const overview = noon.overview || {};
            const indices = overview.indices || [];
            const indexCards = indices.map(idx => `
                <div class="bg-card rounded p-3">
                    <div class="text-xs text-gray-400">${idx.name}</div>
                    <div class="text-xl font-bold font-mono ${idx.change >= 0 ? 'limit-up' : 'limit-down'}">${idx.change >= 0 ? '+' : ''}${idx.change}%</div>
                    <div class="text-xs text-gray-500">${idx.value}</div>
                </div>
            `).join('');
            
            return `
            <div id="content-noon" class="tab-content hidden">
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-cyan-400">
                        <i class="fas fa-chart-bar"></i>大盘概况
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">${indexCards}</div>
                    <div class="bg-amber-500/10 border border-amber-500/20 rounded p-3 text-center">
                        <span class="text-amber-400 font-bold">🟡 市场情绪：${overview.sentiment || '待定'}</span>
                    </div>
                </div>
            </div>`;
        }
        
        function renderReviewTab(review) {
            if (!review.emotion) return '<div id="content-review" class="tab-content hidden"></div>';
            
            const boards = (review.boards || []).map(b => `
                <div class="bg-card rounded-lg p-4 border ${b.openTimes > 10 ? 'border-red-500/30' : b.openTimes === 0 ? 'border-gold/20' : 'border-gold/20'}">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl font-bold text-gold">${b.boards}板</span>
                            <span class="font-bold text-lg">${b.name}</span>
                            <span class="text-gray-400 font-mono">${b.code}</span>
                        </div>
                        <span class="text-xs ${b.openTimes > 10 ? 'bg-red-500/20 text-red-400' : b.openTimes === 0 ? 'bg-green-500/20 text-green-400' : 'bg-amber-500/20 text-amber-400'} px-2 py-1 rounded">${b.status}</span>
                    </div>
                    <div class="text-sm text-gray-300">${b.sector}</div>
                </div>
            `).join('');
            
            const sectors = (review.sectors || []).map(s => `
                <div class="bg-card rounded p-2 text-center border-t-2 ${s.status === '最强' ? 'border-red-400' : s.status === '次强' ? 'border-orange-400' : 'border-amber-400'}">
                    <div class="${s.status === '最强' ? 'text-red-400' : s.status === '次强' ? 'text-orange-400' : 'text-amber-400'} font-bold">${s.name}</div>
                    <div class="text-xs text-gray-400">${s.limitUpCount}涨停 | ${s.attackScore}分</div>
                </div>
            `).join('');
            
            const tomorrow = (review.tomorrow || []).map(t => `
                <tr class="border-b border-border/50">
                    <td class="py-2 font-bold ${t.strategy.includes('严禁') ? 'text-red-400' : 'text-gold'}">${t.tier}</td>
                    <td class="py-2 font-medium">${t.name}</td>
                    <td class="py-2 text-gray-300">${t.today}</td>
                    <td class="py-2 text-gray-300">${t.prediction}</td>
                    <td class="py-2">${t.strategy}</td>
                </tr>
            `).join('');
            
            return `
            <div id="content-review" class="tab-content hidden">
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-cyan-400">
                        <i class="fas fa-chart-pie"></i>情绪周期定位
                    </h2>
                    <div class="bg-amber-500/10 border border-amber-500/20 rounded p-3 text-center">
                        <span class="text-amber-400 font-bold text-lg">🟡 ${review.emotion}（${review.emotionScore || 50}/100）</span>
                    </div>
                </div>
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gold">
                        <i class="fas fa-layer-group"></i>连板梯队
                    </h2>
                    <div class="space-y-3 mb-5">${boards}</div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">${sectors}</div>
                </div>
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-amber-400">
                        <i class="fas fa-chess-knight"></i>明日策略
                    </h2>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead><tr class="text-gray-400 text-xs border-b border-border">
                                <th class="pb-2 text-left">梯队</th>
                                <th class="pb-2 text-left">标的</th>
                                <th class="pb-2 text-left">今日状态</th>
                                <th class="pb-2 text-left">明日预判</th>
                                <th class="pb-2 text-left">策略</th>
                            </tr></thead>
                            <tbody class="text-xs">${tomorrow}</tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }
        
        function renderYouthuTab(youthu) {
            if (!youthu.index) return '<div id="content-youthu" class="tab-content hidden"></div>';
            
            const index = youthu.index || {};
            const indices = index.indices || [];
            const indexCards = indices.map(idx => `
                <div class="bg-card rounded p-3">
                    <div class="text-xs text-gray-400">${idx.name}</div>
                    <div class="text-xl font-bold font-mono ${idx.change >= 0 ? 'limit-up' : 'limit-down'}">${idx.change >= 0 ? '+' : ''}${idx.change}%</div>
                </div>
            `).join('');
            
            const sentiment = youthu.sentiment || {};
            const phase = sentiment.phase || '分歧';
            
            return `
            <div id="content-youthu" class="tab-content hidden">
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gold">
                        <i class="fas fa-dragon"></i>顶级游资复盘 · 只抓3个东西
                    </h2>
                    <div class="bg-gold/10 border border-gold/20 rounded-lg p-4 mb-4">
                        <div class="text-gold font-bold text-lg mb-2">💡 核心逻辑</div>
                        <div class="text-sm text-gray-300">① 情绪周期 → ② 龙头是谁 → ③ 明天怎么玩</div>
                    </div>
                </div>
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-cyan-400">
                        <i class="fas fa-chart-line"></i>指数环境
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">${indexCards}</div>
                </div>
                <div class="glass rounded-lg p-5 mb-5 card-shadow">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-red-400">
                        <i class="fas fa-fire-alt"></i>市场情绪
                    </h2>
                    <div class="bg-amber-500/10 border border-amber-500/20 rounded p-3 text-center mb-3">
                        <div class="text-amber-400 font-bold text-lg mb-1">🔥 情绪周期：${phase}阶段</div>
                    </div>
                </div>
            </div>`;
        }
        
        function renderHistoryTab() {
            return `
            <div id="content-history" class="tab-content hidden">
                <div class="glass rounded-lg p-8 text-center">
                    <i class="fas fa-archive text-4xl text-gray-600 mb-4"></i>
                    <h3 class="text-lg font-bold text-gray-400 mb-2">历史归档</h3>
                    <p class="text-sm text-gray-500">每日复盘数据将自动归档于此</p>
                    <p class="text-xs text-gray-600 mt-4">在上方日期选择器切换历史日期</p>
                </div>
            </div>`;
        }
        
        // ====== UTILITY FUNCTIONS ======
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('text-gold', 'border-gold');
                el.classList.add('text-gray-400', 'border-transparent');
            });
            const content = document.getElementById('content-' + tab);
            if (content) content.classList.remove('hidden');
            const btn = document.getElementById('tab-' + tab);
            if (btn) {
                btn.classList.remove('text-gray-400', 'border-transparent');
                btn.classList.add('text-gold', 'border-gold');
            }
            if (tab === 'review') {
                setTimeout(initCharts, 100);
            }
        }
        
        function copyCode(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-gold text-black px-4 py-2 rounded-lg text-sm font-bold z-50';
                toast.textContent = '已复制: ' + text;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            });
        }
        
        function initCharts() {
            const sectorChartEl = document.getElementById('sectorChart');
            const timeChartEl = document.getElementById('timeChart');
            
            if (sectorChartEl && currentData && currentData.review && currentData.review.sectors) {
                const sectors = currentData.review.sectors;
                const chart = echarts.init(sectorChartEl);
                chart.setOption({
                    backgroundColor: 'transparent',
                    grid: { left: '3%', right: '4%', bottom: '3%', top: '3%', containLabel: true },
                    xAxis: { type: 'value', axisLine: { lineStyle: { color: '#374151' } }, axisLabel: { color: '#9ca3af', fontSize: 10 }, splitLine: { lineStyle: { color: '#1f2937' } } },
                    yAxis: { type: 'category', data: sectors.map(s => s.name).reverse(), axisLine: { lineStyle: { color: '#374151' } }, axisLabel: { color: '#e2e8f0', fontSize: 11 } },
                    series: [{
                        type: 'bar',
                        data: sectors.map(s => ({ value: s.attackScore, itemStyle: { color: s.status === '最强' ? '#ef4444' : s.status === '次强' ? '#f97316' : '#f59e0b' } })).reverse(),
                        barWidth: '60%',
                        label: { show: true, position: 'right', color: '#e2e8f0', fontSize: 10, formatter: '{c}分' }
                    }]
                });
            }
            
            if (timeChartEl && currentData && currentData.review && currentData.review.timeDistribution) {
                const times = currentData.review.timeDistribution;
                const chart = echarts.init(timeChartEl);
                chart.setOption({
                    backgroundColor: 'transparent',
                    grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
                    xAxis: { type: 'category', data: Object.keys(times), axisLine: { lineStyle: { color: '#374151' } }, axisLabel: { color: '#9ca3af', fontSize: 10 } },
                    yAxis: { type: 'value', axisLine: { lineStyle: { color: '#374151' } }, axisLabel: { color: '#9ca3af', fontSize: 10 }, splitLine: { lineStyle: { color: '#1f2937' } } },
                    series: [{
                        type: 'bar',
                        data: Object.values(times),
                        barWidth: '50%',
                        label: { show: true, position: 'top', color: '#e2e8f0', fontSize: 10, formatter: '{c}只' }
                    }]
                });
            }
        }
        
        window.addEventListener('resize', () => {
            const sectorChart = echarts.getInstanceByDom(document.getElementById('sectorChart'));
            const timeChart = echarts.getInstanceByDom(document.getElementById('timeChart'));
            if (sectorChart) sectorChart.resize();
            if (timeChart) timeChart.resize();
        });
        
        // Load initial data
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</body>
</html>
